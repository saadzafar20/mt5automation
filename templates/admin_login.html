<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin Login</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; background: #f4f6f8; }
    .wrap { max-width: 420px; margin: 72px auto; background: white; padding: 24px; border-radius: 10px; box-shadow: 0 2px 12px rgba(0,0,0,.08); }
    h1 { margin-top: 0; font-size: 22px; }
    label { display:block; margin-top: 12px; font-weight: 600; }
    input { width:100%; padding: 10px; margin-top:6px; box-sizing:border-box; border: 1px solid #d0d7de; border-radius: 8px; }
    button { margin-top: 16px; width:100%; padding: 10px; border: 0; border-radius: 8px; background: #111827; color: white; font-weight: 700; cursor:pointer; }
    .msg { margin-top: 12px; padding: 10px; border-radius: 8px; }
    .error { background: #fee2e2; color: #991b1b; }
    .success { background: #dcfce7; color: #166534; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Admin Sign in</h1>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="msg {{ category }}">{{ message }}</div>
      {% endfor %}
    {% endwith %}
    <form method="post" action="/admin/login">
      <label for="username">Admin username</label>
      <input id="username" name="username" type="text" required />
      <label for="password">Admin password</label>
      <input id="password" name="password" type="password" required />
      <button type="submit">Sign in</button>
    </form>
  </div>
</body>
</html>
