name: Build Mac App

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: relay-ui/package-lock.json

      - name: Compute version
        shell: bash
        run: |
          COUNT=$(git rev-list --count HEAD)
          VERSION="2.0.$COUNT"
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          cd relay-ui
          npm version $VERSION --no-git-tag-version --allow-same-version

      - name: Install deps
        run: cd relay-ui && npm ci

      - name: Build Electron app (.dmg)
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: cd relay-ui && npm run electron:build:mac

      - name: Upload .dmg files to Cloudflare R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: |
          ARM_DMG=$(find dist-electron -name "*arm64*.dmg" | head -1)
          X64_DMG=$(find dist-electron -name "*x64*.dmg" | head -1)
          if [ -n "$ARM_DMG" ]; then
            aws s3 cp "$ARM_DMG" s3://platalgo/PlatAlgoRelay.dmg \
              --endpoint-url https://a386c836005eda80b1b2f34221189103.r2.cloudflarestorage.com \
              --no-progress
            aws s3 cp "$ARM_DMG" s3://platalgo/PlatAlgoRelay-arm64.dmg \
              --endpoint-url https://a386c836005eda80b1b2f34221189103.r2.cloudflarestorage.com \
              --no-progress
          fi
          if [ -n "$X64_DMG" ]; then
            aws s3 cp "$X64_DMG" s3://platalgo/PlatAlgoRelay-x64.dmg \
              --endpoint-url https://a386c836005eda80b1b2f34221189103.r2.cloudflarestorage.com \
              --no-progress
          fi

      - name: Upload auto-update manifest
        shell: bash
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: |
          # Upload latest-mac.yml for electron-updater auto-updates
          YML_FILE=$(find dist-electron -name "latest-mac.yml" | head -1)
          if [ -n "$YML_FILE" ]; then
            aws s3 cp "$YML_FILE" s3://platalgo/latest-mac.yml \
              --endpoint-url https://a386c836005eda80b1b2f34221189103.r2.cloudflarestorage.com \
              --no-progress
          fi
          # Upload ZIP files (needed for auto-update on Mac)
          for f in $(find dist-electron -name "*.zip"); do
            aws s3 cp "$f" "s3://platalgo/$(basename $f)" \
              --endpoint-url https://a386c836005eda80b1b2f34221189103.r2.cloudflarestorage.com \
              --no-progress
          done
          # Version manifest
          echo "{\"version\":\"$VERSION\",\"windows_url\":\"https://pub-c30cd5bbe12144caac83d4bd06bfbc6b.r2.dev/PlatAlgoRelay.exe\",\"mac_url\":\"https://pub-c30cd5bbe12144caac83d4bd06bfbc6b.r2.dev/PlatAlgoRelay.dmg\"}" > manifest.json
          aws s3 cp manifest.json s3://platalgo/manifest.json \
            --endpoint-url https://a386c836005eda80b1b2f34221189103.r2.cloudflarestorage.com \
            --no-progress
