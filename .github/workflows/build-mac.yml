name: Build Mac App

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: relay-ui/package-lock.json

      - name: Compute version
        shell: bash
        run: |
          COUNT=$(git rev-list --count HEAD)
          VERSION="2.0.$COUNT"
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          cd relay-ui
          npm version $VERSION --no-git-tag-version --allow-same-version

      - name: Install deps
        run: cd relay-ui && npm ci

      - name: Build Electron app (.dmg)
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: cd relay-ui && npm run electron:build:mac

      - name: Upload .dmg to Cloudflare R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: |
          DMG_FILE=$(find dist-electron -name "*.dmg" | head -1)
          aws s3 cp "$DMG_FILE" s3://platalgo/PlatAlgoRelay.dmg \
            --endpoint-url https://a386c836005eda80b1b2f34221189103.r2.cloudflarestorage.com \
            --no-progress

      - name: Upload version manifest
        shell: bash
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: |
          echo "{\"version\":\"$VERSION\",\"windows_url\":\"https://pub-c30cd5bbe12144caac83d4bd06bfbc6b.r2.dev/PlatAlgoRelay.exe\",\"mac_url\":\"https://pub-c30cd5bbe12144caac83d4bd06bfbc6b.r2.dev/PlatAlgoRelay.dmg\"}" > manifest.json
          aws s3 cp manifest.json s3://platalgo/manifest.json \
            --endpoint-url https://a386c836005eda80b1b2f34221189103.r2.cloudflarestorage.com \
            --no-progress
