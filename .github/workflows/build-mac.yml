name: Build Mac App

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build .dmg
        run: |
          chmod +x build_relay_mac.sh
          ./build_relay_mac.sh

      - name: Upload .dmg to Cloudflare R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: |
          aws s3 cp dist/PlatAlgoRelay.dmg s3://platalgo-releases/PlatAlgoRelay.dmg \
            --endpoint-url https://a386c836005eda80b1b2f34221189103.r2.cloudflarestorage.com \
            --no-progress
