name: Build Windows App

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build .exe
        run: |
          pip install --quiet --upgrade pip
          pip install --quiet pyinstaller customtkinter pillow pystray keyring requests
          if (-not (Test-Path "config.json")) { '{}' | Out-File -Encoding utf8 config.json }
          pyinstaller --noconfirm --onefile --windowed `
            --name PlatAlgoRelay `
            --add-data "config.json;." `
            --hidden-import customtkinter `
            --hidden-import PIL._tkinter_finder `
            --hidden-import pystray `
            --hidden-import keyring.backends.Windows `
            --hidden-import keyring.backends.fail `
            --collect-all customtkinter `
            relay_gui.py
        shell: pwsh

      - name: Upload .exe to Cloudflare R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: |
          aws s3 cp dist\PlatAlgoRelay.exe s3://Platalgo/PlatAlgoRelay.exe `
            --endpoint-url https://a386c836005eda80b1b2f34221189103.r2.cloudflarestorage.com `
            --no-progress
        shell: pwsh
