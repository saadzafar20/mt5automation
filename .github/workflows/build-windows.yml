name: Build Windows App

on:
  workflow_dispatch:
jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: relay-ui/package-lock.json

      - name: Compute version
        shell: bash
        run: |
          COUNT=$(git rev-list --count HEAD)
          VERSION="2.1.$COUNT"
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          cd relay-ui
          npm version $VERSION --no-git-tag-version --allow-same-version

      - name: Install deps
        run: cd relay-ui && npm ci

      - name: Build Electron app (.exe)
        run: cd relay-ui && npm run electron:build:win

      - name: Upload .exe to Cloudflare R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        shell: bash
        run: |
          EXE_FILE=$(find dist-electron -name "*.exe" -not -name "*uninstaller*" | head -1)
          # Upload with generic name for website download link
          aws s3 cp "$EXE_FILE" s3://platalgo/PlatAlgoRelay.exe \
            --endpoint-url https://a386c836005eda80b1b2f34221189103.r2.cloudflarestorage.com \
            --no-progress
          # Also upload with versioned name so latest.yml can reference it for auto-update
          aws s3 cp "$EXE_FILE" "s3://platalgo/$(basename "$EXE_FILE")" \
            --endpoint-url https://a386c836005eda80b1b2f34221189103.r2.cloudflarestorage.com \
            --no-progress

      - name: Upload auto-update manifest
        shell: bash
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: |
          # Upload latest.yml for electron-updater auto-updates
          YML_FILE=$(find dist-electron -name "latest.yml" | head -1)
          if [ -n "$YML_FILE" ]; then
            aws s3 cp "$YML_FILE" s3://platalgo/latest.yml \
              --endpoint-url https://a386c836005eda80b1b2f34221189103.r2.cloudflarestorage.com \
              --no-progress
          fi
          # Version manifest
          echo "{\"version\":\"$VERSION\",\"windows_url\":\"https://pub-c30cd5bbe12144caac83d4bd06bfbc6b.r2.dev/PlatAlgoRelay.exe\",\"mac_url\":\"https://pub-c30cd5bbe12144caac83d4bd06bfbc6b.r2.dev/PlatAlgoRelay.dmg\"}" > manifest.json
          aws s3 cp manifest.json s3://platalgo/manifest.json \
            --endpoint-url https://a386c836005eda80b1b2f34221189103.r2.cloudflarestorage.com \
            --no-progress
