name: Build Windows App

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: self-hosted
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: relay-ui/package-lock.json

      - name: Compute version
        shell: bash
        run: |
          COUNT=$(git rev-list --count HEAD)
          VERSION="2.1.$COUNT"
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          cd relay-ui
          npm version $VERSION --no-git-tag-version --allow-same-version

      - name: Install deps
        run: cd relay-ui && npm ci

      - name: Build Electron app (.exe)
        run: cd relay-ui && npm run electron:build:win

      - name: Copy .exe to download folder
        shell: bash
        run: |
          EXE_FILE=$(find relay-ui/dist-electron -name "*.exe" -not -name "*uninstaller*" | head -1)
          mkdir -p "C:/trading/downloads"
          cp "$EXE_FILE" "C:/trading/downloads/PlatAlgoRelay.exe"
          cp "$EXE_FILE" "C:/trading/downloads/PlatAlgoRelay-${VERSION}.exe"

      - name: Write manifest.json
        shell: bash
        run: |
          BASE_URL="${{ secrets.BRIDGE_PUBLIC_URL }}"
          YML_FILE=$(find relay-ui/dist-electron -name "latest.yml" | head -1)
          if [ -n "$YML_FILE" ]; then
            cp "$YML_FILE" "C:/trading/downloads/latest.yml"
          fi
          printf '{"version":"%s","windows_url":"%s/downloads/PlatAlgoRelay.exe","mac_url":"%s/downloads/PlatAlgoRelay.dmg"}' \
            "$VERSION" "$BASE_URL" "$BASE_URL" \
            > "C:/trading/downloads/manifest.json"

      - name: Restart bridge service
        shell: powershell
        run: nssm restart PlatAlgoBridge
