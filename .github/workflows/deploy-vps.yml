# NOTE: Windows .exe build is now handled automatically by build-windows.yml
# via self-hosted runner on the VPS (triggers on every push to main).
# This workflow is kept for manually restarting/redeploying the bridge service only.

name: Deploy to VPS

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Deploy to Windows VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            cd C:\trading
            git pull origin main
            nssm restart PlatAlgoBridge
