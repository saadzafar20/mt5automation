name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Deploy to Windows VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            cd C:\trading
            git pull origin main
            wmic process where "commandline like '%%cloud_bridge.py%%'" delete
            timeout /t 3 /nobreak >nul
            start /B cmd /c "cd /d C:\trading && call start_cloud_bridge_windows.bat > C:\trading\bridge.log 2>&1"
